{% extends "base.html" %}

{% block title %}Register - Personal Finance Manager{% endblock %}

{% block content %}
<!-- Animated Background -->
<div id="vantaBackground" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>

<!-- Page Transition Loader -->
<div id="pageTransitionLoader" class="page-transition-loader">
    <div class="page-transition-content">
        <div class="professional-spinner"></div>
    </div>
</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4">Create Your Account</h3>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required
                                       pattern="[a-zA-Z0-9_]{3,20}"
                                       title="Username should be 3-20 characters, letters, numbers, and underscores only">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required
                                       minlength="8" title="Password must be at least 8 characters long">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the terms and conditions
                            </label>
                        </div>

                        <button type="submit" class="btn btn-gradient w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>Register
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<!-- Vanta.js for animated background (self-hosted) -->
<script src="{{ url_for('static', filename='js/vendor/three.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/vendor/vanta.birds.min.js') }}"></script>
<!-- Ensure base.js is loaded first -->
<script src="{{ url_for('static', filename='js/base.js') }}?v=3.0"></script>
<script src="{{ url_for('static', filename='js/register.js') }}?v=3.0"></script>
<script>
// Initialize Vanta.js background
let vantaEffect = null;

function initVantaBackground() {
    if (typeof VANTA !== 'undefined' && typeof VANTA.BIRDS !== 'undefined') {
        const bgElement = document.getElementById('vantaBackground');
        if (bgElement) {
            // Get current theme
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';

            // Set colors based on theme
            const colors = theme === 'dark' ? {
                backgroundColor: 0x1a1a1a,
                color1: 0x007acc,
                color2: 0x0066ff,
                colorMode: 'variance'
            } : {
                backgroundColor: 0xf8fafc,
                color1: 0x0866ff,
                color2: 0x4299e1,
                colorMode: 'variance'
            };

            vantaEffect = VANTA.BIRDS({
                el: bgElement,
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 0.50,
                scaleMobile: 0.50,
                ...colors,
                quantity: 8.00,
                speedLimit: 4.00,
                separation: 50.00,
                alignment: 50.00,
                cohesion: 50.00
            });
        }
    }
}

// Initialize Vanta background when page loads
window.addEventListener('load', function() {
    initVantaBackground();
});

// Reinitialize on theme change
if (typeof window.updateVantaTheme === 'undefined') {
    window.updateVantaTheme = function() {
        if (vantaEffect) {
            vantaEffect.destroy();
            vantaEffect = null;
        }
        initVantaBackground();
    };
}
</script>
{% endblock %}
