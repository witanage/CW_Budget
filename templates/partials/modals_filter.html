<!-- Filter Modal - Compact Design -->
<div class="modal fade" id="filterModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h6 class="modal-title mb-0">
                    <i class="fas fa-filter me-2 text-primary"></i>Advanced Filters
                    <span class="badge bg-primary ms-2 small" id="filterPreviewCount">0 results</span>
                </h6>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-2" style="max-height: 70vh; overflow-y: auto;">
                <!-- Quick Actions Bar -->
                <div class="d-flex gap-1 mb-2 flex-wrap">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-clock"></i> Quick
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('today')">Today</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('yesterday')">Yesterday</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('last7days')">Last 7 Days</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('last30days')">Last 30 Days</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('thisMonth')">This Month</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('lastMonth')">Last Month</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('income')">Income Only</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('expense')">Expenses Only</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('unpaid')">Unpaid</a></li>
                            <li><a class="dropdown-item" href="#" onclick="applyQuickFilter('paid')">Paid</a></li>
                        </ul>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-outline-primary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-bookmark"></i> Saved
                        </button>
                        <div class="dropdown-menu p-2" style="min-width: 200px;">
                            <div id="savedPresetsContainer" class="d-flex flex-column gap-1 mb-2">
                                <small class="text-muted">No presets</small>
                            </div>
                            <button type="button" class="btn btn-outline-primary btn-sm w-100" id="saveCurrentPresetBtn">
                                <i class="fas fa-save"></i> Save Current
                            </button>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-outline-info btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-history"></i> Recent
                        </button>
                        <div class="dropdown-menu p-2" style="min-width: 200px;">
                            <div id="recentFiltersContainer" class="d-flex flex-column gap-1">
                                <small class="text-muted">No recent</small>
                            </div>
                        </div>
                    </div>
                    <div class="ms-auto">
                        <span class="badge bg-info" id="filterStatTotal">- items</span>
                        <span class="badge bg-success" id="filterStatIncome">- in</span>
                        <span class="badge bg-danger" id="filterStatExpense">- out</span>
                    </div>
                </div>

                <!-- Tabs for Filter Sections -->
                <ul class="nav nav-tabs nav-fill compact-tabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#filterBasicTab">
                            <i class="fas fa-sliders-h"></i> Basic
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#filterCategoryTab">
                            <i class="fas fa-tags"></i> Categories
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#filterPaymentTab">
                            <i class="fas fa-credit-card"></i> Payment
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#filterAdvancedTab">
                            <i class="fas fa-cog"></i> More
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content p-2">
                    <!-- Basic Filters Tab -->
                    <div class="tab-pane fade show active" id="filterBasicTab">
                        <div class="row g-2">
                            <!-- Date Range -->
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-calendar"></i> From Date</label>
                                <div class="input-group input-group-sm">
                                    <input type="date" class="form-control form-control-sm" id="filterStartDate">
                                    <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('filterStartDate').value=''">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-calendar"></i> To Date</label>
                                <div class="input-group input-group-sm">
                                    <input type="date" class="form-control form-control-sm" id="filterEndDate">
                                    <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('filterEndDate').value=''">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Amount Range -->
                            <div class="col-md-6">
                                <label class="form-label small mb-1">Min Amount</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">රු</span>
                                    <input type="number" class="form-control form-control-sm" id="filterMinAmount" placeholder="0.00" step="0.01" min="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small mb-1">Max Amount</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">රු</span>
                                    <input type="number" class="form-control form-control-sm" id="filterMaxAmount" placeholder="No limit" step="0.01" min="0">
                                </div>
                            </div>

                            <!-- Amount Presets -->
                            <div class="col-12">
                                <div class="btn-group btn-group-sm w-100" role="group">
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(0, 50)">0-50</button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(50, 100)">50-100</button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(100, 500)">100-500</button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(500, 1000)">500-1K</button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(1000, 5000)">1K-5K</button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="setAmountRange(5000, null)">5K+</button>
                                </div>
                            </div>

                            <!-- Transaction Type & Status in 2 columns -->
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-exchange-alt"></i> Type</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input filter-type-checkbox" type="checkbox" value="income" id="filterTypeIncome">
                                    <label class="form-check-label small" for="filterTypeIncome">Income</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input filter-type-checkbox" type="checkbox" value="expense" id="filterTypeExpense">
                                    <label class="form-check-label small" for="filterTypeExpense">Expense</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-check-circle"></i> Status</label>
                                <div class="row row-cols-2 g-1">
                                    <div class="col">
                                        <div class="form-check">
                                            <input class="form-check-input filter-status-checkbox" type="checkbox" value="done" id="filterStatusDone">
                                            <label class="form-check-label small" for="filterStatusDone">Done</label>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <div class="form-check">
                                            <input class="form-check-input filter-status-checkbox" type="checkbox" value="not_done" id="filterStatusNotDone">
                                            <label class="form-check-label small" for="filterStatusNotDone">Not Done</label>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <div class="form-check">
                                            <input class="form-check-input filter-status-checkbox" type="checkbox" value="paid" id="filterStatusPaid">
                                            <label class="form-check-label small" for="filterStatusPaid">Paid</label>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <div class="form-check">
                                            <input class="form-check-input filter-status-checkbox" type="checkbox" value="unpaid" id="filterStatusUnpaid">
                                            <label class="form-check-label small" for="filterStatusUnpaid">Unpaid</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Search Fields -->
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-search"></i> Description</label>
                                <input type="text" class="form-control form-control-sm" id="filterDescription" placeholder="Search...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small mb-1"><i class="fas fa-sticky-note"></i> Notes</label>
                                <input type="text" class="form-control form-control-sm" id="filterNotes" placeholder="Search...">
                            </div>
                        </div>
                    </div>

                    <!-- Categories Tab -->
                    <div class="tab-pane fade" id="filterCategoryTab">
                        <div class="input-group input-group-sm mb-2">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="categorySearchInput" placeholder="Search categories...">
                        </div>
                        <div class="btn-group btn-group-sm w-100 mb-2" role="group">
                            <button type="button" class="btn btn-outline-primary" onclick="selectAllCategories()">All</button>
                            <button type="button" class="btn btn-outline-secondary" onclick="deselectAllCategories()">Clear</button>
                            <button type="button" class="btn btn-outline-success" onclick="selectIncomeCategoriesOnly()">Income</button>
                            <button type="button" class="btn btn-outline-danger" onclick="selectExpenseCategoriesOnly()">Expense</button>
                        </div>
                        <div id="filterCategoryCheckboxes" class="filter-checkbox-container" style="max-height: 300px; overflow-y: auto;">
                            <!-- Categories will be populated here -->
                        </div>
                    </div>

                    <!-- Payment Methods Tab -->
                    <div class="tab-pane fade" id="filterPaymentTab">
                        <div class="input-group input-group-sm mb-2">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="paymentSearchInput" placeholder="Search payment methods...">
                        </div>
                        <div class="btn-group btn-group-sm w-100 mb-2" role="group">
                            <button type="button" class="btn btn-outline-primary" onclick="selectAllPaymentMethods()">All</button>
                            <button type="button" class="btn btn-outline-secondary" onclick="deselectAllPaymentMethods()">Clear</button>
                            <button type="button" class="btn btn-outline-success" onclick="selectCashPaymentMethodsOnly()">Cash</button>
                            <button type="button" class="btn btn-outline-info" onclick="selectCardPaymentMethodsOnly()">Cards</button>
                        </div>
                        <div id="filterPaymentMethodCheckboxes" class="filter-checkbox-container" style="max-height: 300px; overflow-y: auto;">
                            <!-- Payment methods will be populated here -->
                        </div>
                    </div>

                    <!-- Advanced/More Options Tab -->
                    <div class="tab-pane fade" id="filterAdvancedTab">
                        <div class="row g-2">
                            <div class="col-12">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="filterCaseSensitive">
                                    <label class="form-check-label small" for="filterCaseSensitive">Case-sensitive</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="filterExcludeWeekends">
                                    <label class="form-check-label small" for="filterExcludeWeekends">Exclude weekends</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="alert alert-info py-2 mb-0 small">
                                    <strong id="activeFiltersCount">0 filters</strong> active
                                    <div id="activeFiltersList" class="mt-1">
                                        <span class="badge bg-secondary">None</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer py-2">
                <button type="button" class="btn btn-outline-info btn-sm" id="previewFiltersBtn">
                    <i class="fas fa-eye"></i> Preview
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="clearFiltersBtn">
                    <i class="fas fa-eraser"></i> Clear
                </button>
                <button type="button" class="btn btn-primary btn-sm" id="applyFiltersBtn">
                    <i class="fas fa-check"></i> Apply
                </button>
            </div>
        </div>
    </div>
</div>
