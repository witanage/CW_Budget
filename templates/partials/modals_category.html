<!-- Manage Categories Modal -->
<div class="modal fade" id="manageCategoriesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Manage Categories</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 1rem; max-height: calc(100vh - 200px); overflow-y: auto;">
                <div class="alert alert-info mb-2 py-2">
                    <i class="fas fa-info-circle me-2"></i>
                    <small>Categories being used in transactions cannot be deleted.</small>
                </div>

                <!-- Edit Category Form (initially hidden) -->
                <div id="editCategoryForm" class="mb-2" style="display: none;">
                    <div class="card border-warning">
                        <div class="card-body p-2">
                            <h6 class="card-title mb-2" style="font-size: 0.9rem;">
                                <i class="fas fa-edit me-2"></i>Edit Category
                            </h6>
                            <form id="categoryEditForm">
                                <input type="hidden" id="editCategoryId">
                                <div class="row g-2">
                                    <div class="col-md-6">
                                        <label for="editCategoryName" class="form-label" style="font-size: 0.85rem; margin-bottom: 0.25rem;">Category Name</label>
                                        <input type="text" class="form-control form-control-sm" id="editCategoryName" maxlength="255" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="editCategoryType" class="form-label" style="font-size: 0.85rem; margin-bottom: 0.25rem;">Type</label>
                                        <select class="form-select form-select-sm" id="editCategoryType" required>
                                            <option value="income">Income</option>
                                            <option value="expense">Expense</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-2">
                                    <button type="button" class="btn btn-success btn-sm" id="saveEditCategoryBtn">
                                        <i class="fas fa-save me-1"></i>Save
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-sm" id="cancelEditCategoryBtn">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </button>
                                </div>
                                <div id="editCategoryMessage" class="mt-2" style="display: none;"></div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="row g-2">
                    <!-- Income Categories -->
                    <div class="col-md-6">
                        <h6 class="text-success mb-2" style="font-size: 0.9rem;"><i class="fas fa-arrow-down me-2"></i>Income Categories</h6>
                        <div id="incomeCategoriesList" class="list-group" style="max-height: 300px; overflow-y: auto;">
                            <!-- Income categories will be loaded here -->
                        </div>
                    </div>

                    <!-- Expense Categories -->
                    <div class="col-md-6">
                        <h6 class="text-danger mb-2" style="font-size: 0.9rem;"><i class="fas fa-arrow-up me-2"></i>Expense Categories</h6>
                        <div id="expenseCategoriesList" class="list-group" style="max-height: 300px; overflow-y: auto;">
                            <!-- Expense categories will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="padding: 0.5rem 1rem;">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Category Confirmation Modal -->
<div class="modal fade" id="deleteCategoryConfirmModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-exclamation-triangle text-warning me-2"></i>Confirm Delete
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="deleteCategoryConfirmMessage"></p>
                <div class="alert alert-warning mb-0">
                    <i class="fas fa-info-circle me-2"></i>
                    <strong>Note:</strong> Categories that are being used in transactions cannot be deleted.
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteCategoryBtn">
                    <i class="fas fa-trash me-1"></i>Delete Category
                </button>
            </div>
        </div>
    </div>
</div>
