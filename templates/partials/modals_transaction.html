<!-- Transaction Modal -->
<div class="modal fade" id="transactionModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Transaction</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="transactionForm" novalidate>
                    <!-- Scan Status Display -->
                    <div id="scanStatus" class="mb-2 text-center" style="display: none; color: #ffc107;">
                        <i class="fas fa-spinner fa-spin me-1"></i>
                        <span id="scanStatusText">Scanning bill...</span>
                    </div>
                    <!-- Bill Breakdown Display -->
                    <div id="billBreakdown" class="mb-2" style="display: none;">
                        <div class="card">
                            <div class="card-body p-2">
                                <h6 class="card-title mb-1" style="font-size: 0.875rem;">
                                    <i class="fas fa-receipt me-1"></i>Bill Breakdown
                                </h6>
                                <div id="billBreakdownContent" class="small"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Two-column layout for form fields -->
                    <div class="row">
                        <!-- Left Column -->
                        <div class="col-md-6">
                            <div class="mb-2">
                                <label for="transDescription" class="form-label">Description</label>
                                <input type="text" class="form-control form-control-sm" id="transDescription" required>
                            </div>
                            <div class="mb-2">
                                <label for="transCategory" class="form-label">Category</label>
                                <div class="d-flex gap-1 align-items-start">
                                    <select class="form-select form-select-sm" id="transCategory">
                                        <!-- Categories will be loaded here -->
                                    </select>
                                    <button type="button" class="btn btn-outline-primary btn-sm" id="toggleNewCategoryBtn" style="white-space: nowrap;">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>

                                <!-- Inline category creation form (initially hidden) -->
                                <div id="newCategoryForm" class="mt-1" style="display: none;">
                                    <div class="card border-primary">
                                        <div class="card-body p-2">
                                            <div class="mb-1">
                                                <input type="text" class="form-control form-control-sm" id="newCategoryName" placeholder="Category name" maxlength="255">
                                            </div>
                                            <div class="mb-1">
                                                <select class="form-select form-select-sm" id="newCategoryType">
                                                    <option value="">Type...</option>
                                                    <option value="income">Income</option>
                                                    <option value="expense">Expense</option>
                                                </select>
                                            </div>
                                            <div class="d-flex gap-1">
                                                <button type="button" class="btn btn-primary btn-sm flex-fill" id="saveNewCategoryBtn">
                                                    <i class="fas fa-check"></i>
                                                </button>
                                                <button type="button" class="btn btn-secondary btn-sm flex-fill" id="cancelNewCategoryBtn">
                                                    <i class="fas fa-times"></i>
                                                </button>
                                            </div>
                                            <div id="newCategoryMessage" class="mt-1" style="display: none;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label for="transDebit" class="form-label">Debit (Income)</label>
                                <input type="text" class="form-control form-control-sm" id="transDebit" placeholder="0.00" inputmode="decimal">
                            </div>
                            <div class="mb-2">
                                <label for="transCredit" class="form-label">Credit (Expense)</label>
                                <input type="text" class="form-control form-control-sm" id="transCredit" placeholder="0.00" inputmode="decimal">
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="col-md-6">
                            <div class="mb-2">
                                <label for="transPaymentMethod" class="form-label">Payment Method</label>
                                <select class="form-select form-select-sm" id="transPaymentMethod">
                                    <option value="">None (Not Paid)</option>
                                    <!-- Payment methods will be loaded here -->
                                </select>
                            </div>
                            <div class="mb-2" id="paidAtGroup" style="display: none;">
                                <label class="form-label">Payment Status</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="paidAtOption" id="paidAtPaid" value="paid">
                                        <label class="form-check-label" for="paidAtPaid">Paid</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="paidAtOption" id="paidAtNotPaid" value="not_paid" checked>
                                        <label class="form-check-label" for="paidAtNotPaid">Not Paid</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label for="transNotes" class="form-label">Notes</label>
                                <textarea class="form-control form-control-sm" id="transNotes" rows="4"></textarea>
                            </div>
                        </div>
                    </div>

                    <input type="hidden" id="editTransactionId" value="">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="saveTransactionBtn">Save Transaction</button>
            </div>
        </div>
    </div>
</div>

<!-- Payment Method Selection Modal -->
<div class="modal fade" id="paymentMethodModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Select Payment Method</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>How did you pay for this transaction?</p>
                <div id="paymentMethodList" class="list-group">
                    <!-- Payment methods will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
