name: Refresh Exchange Rates

on:
  schedule:
    # Every 5 minutes from 0:30 AM to 0:55 AM UTC (6:00 AM to 6:25 AM SLT)
    - cron: '30,35,40,45,50,55 0 * * *'
    # Every 5 minutes from 1:00 AM to 11:55 AM UTC (6:30 AM to 5:25 PM SLT)
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 1-11 * * *'
    # Every 5 minutes from 12:00 PM to 12:30 PM UTC (5:30 PM to 6:00 PM SLT)
    - cron: '0,5,10,15,20,25,30 12 * * *'
  workflow_dispatch:

jobs:
  refresh-exchange-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Call Exchange Rate Refresh API
        run: |
          if [ -z "${{ secrets.EXCHANGE_RATE_TOKEN }}" ]; then
            echo "❌ No token found. Token may not have been generated yet."
            exit 1
          fi
          
          response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.APP_URL }}/api/exchange-rate/refresh-all" \
            -H "Authorization: Bearer ${{ secrets.EXCHANGE_RATE_TOKEN }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Successfully refreshed exchange rates"
          else
            echo "❌ Failed to refresh exchange rates"
            exit 1
          fi
