name: Refresh Exchange Rates

on:
  schedule:
    # Every 15 minutes from 2:30 AM to 2:45 AM UTC (8:00 AM to 8:15 AM SLT)
    - cron: '30,45 2 * * *'
    # Every 15 minutes from 3:00 AM to 11:45 AM UTC (8:30 AM to 5:15 PM SLT)
    - cron: '0,15,30,45 3-11 * * *'
    # Every 15 minutes from 12:00 PM to 12:30 PM UTC (5:30 PM to 6:00 PM SLT)
    - cron: '0,15,30 12 * * *'
  workflow_dispatch:

jobs:
  refresh-exchange-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Call Exchange Rate Refresh API
        run: |
          if [ -z "${{ secrets.EXCHANGE_RATE_TOKEN }}" ]; then
            echo "❌ No token found. Token may not have been generated yet."
            exit 1
          fi
          
          response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.APP_URL }}/api/exchange-rate/refresh-all" \
            -H "Authorization: Bearer ${{ secrets.EXCHANGE_RATE_TOKEN }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Successfully refreshed exchange rates"
          else
            echo "❌ Failed to refresh exchange rates"
            exit 1
          fi
