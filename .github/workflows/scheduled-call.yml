name: Scheduled Exchange Rate Refresh

on:
  schedule:
    # Generate token at 5:00 AM SLT (11:30 PM UTC previous day)
    - cron: '30 23 * * 0-4'  # Sun-Thu nights for Mon-Fri mornings in SLT
    # Every 15 minutes from 3:00 AM to 11:45 AM UTC (8:30 AM to 5:15 PM SLT) on weekdays
    - cron: '0,15,30,45 3-11 * * 1-5'
    # Every 15 minutes from 12:00 PM to 12:30 PM UTC (5:30 PM to 6:00 PM SLT) on weekdays
    - cron: '0,15,30 12 * * 1-5'
    # Remove token at 6:30 PM SLT (1:00 PM UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  generate-token:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 23 * * 0-4' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate')

    steps:
      - name: Generate and Store Daily API Token
        run: |
          echo "🔑 Generating daily authentication token..."
          
          response=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/auth/token" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.API_USERNAME }}\",\"password\":\"${{ secrets.API_PASSWORD }}\"}")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          if [ "$http_code" -eq 200 ]; then
            token=$(echo "$body" | jq -r '.token')
            
            echo "Storing token as GitHub secret..."
            echo "$token" | gh secret set EXCHANGE_RATE_TOKEN --repo ${{ github.repository }}
            
            echo "✅ Daily token generated and stored successfully"
          else
            echo "❌ Failed to generate token"
            echo "Response: $body"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  refresh-exchange-rates:
    runs-on: ubuntu-latest
    if: |
      (github.event.schedule == '0,15,30,45 3-11 * * 1-5' || 
       github.event.schedule == '0,15,30 12 * * 1-5' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'generate' && github.event.inputs.action != 'cleanup'))

    steps:
      - name: Call Exchange Rate Refresh API
        run: |
          if [ -z "${{ secrets.EXCHANGE_RATE_TOKEN }}" ]; then
            echo "❌ No token found. Token may not have been generated yet."
            exit 1
          fi
          
          response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.APP_URL }}/api/exchange-rate/refresh-all" \
            -H "Authorization: Bearer ${{ secrets.EXCHANGE_RATE_TOKEN }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Successfully refreshed exchange rates"
          else
            echo "❌ Failed to refresh exchange rates"
            exit 1
          fi

  cleanup-token:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'cleanup')

    steps:
      - name: Remove Daily API Token
        run: |
          echo "🧹 Removing daily API token..."
          
          gh secret delete EXCHANGE_RATE_TOKEN --repo ${{ github.repository }} || true
          
          echo "✅ Token removed successfully"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
