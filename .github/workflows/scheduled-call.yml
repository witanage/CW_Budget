name: Scheduled Exchange Rate Refresh

on:
  schedule:
    # Every 15 minutes from 3:00 AM to 11:45 AM UTC (8:30 AM to 5:15 PM SLT) on weekdays
    - cron: '0,15,30,45 3-11 * * 1-5'
    # Every 15 minutes from 12:00 PM to 12:30 PM UTC (5:30 PM to 6:00 PM SLT) on weekdays
    - cron: '0,15,30 12 * * 1-5'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  refresh-exchange-rates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Call Exchange Rate Refresh API
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.APP_URL }}/api/exchange-rate/refresh-all")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Successfully refreshed exchange rates"
          else
            echo "❌ Failed to refresh exchange rates"
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.APP_URL }}
